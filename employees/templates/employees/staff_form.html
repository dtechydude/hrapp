{% extends 'dashboard/base.html' %}
{% block title %}Add New Staff{% endblock %}
{% block breadcrumb %}Add Staff{% endblock %}

{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <form method="post" class="row g-3">
            {% csrf_token %}
            <div class="col-md-6">
                <h5>Account Details</h5>
                {{ user_form.as_p }}
            </div>
            <div class="col-md-6">
                <h5>Profile Details</h5>
                {{ form.as_p }}
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-primary">Create Staff Record</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
