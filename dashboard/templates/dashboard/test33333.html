<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HRPAMS Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <style>
    :root {
      --navy: #0B1D3A; --gold: #C9A84C; --surface: #F4F7FB; --white: #FFFFFF;
      --text-main: #1A2B42; --text-muted: #5A6E85; --border: #D8E3EE;
      --font-display: 'Sora', sans-serif; --font-body: 'Inter', sans-serif;
    }
    body { font-family: var(--font-body); background: var(--surface); color: var(--text-main); }
    
    /* Sidebar */
    .sidebar { width: 260px; background: var(--navy); min-height: 100vh; position: fixed; color: white; padding: 20px; }
    .nav-link-custom { color: rgba(255,255,255,.75); padding: 12px 16px; border-radius: 6px; display: block; margin-bottom: 5px; text-decoration: none; }
    .nav-link-custom:hover, .nav-link-custom.active { background: rgba(201,168,76,.15); color: var(--gold); }
    
    /* Main Layout */
    .content-area { margin-left: 260px; padding: 30px; }
    .card-custom { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(11,29,58,.08); }
    .stat-val { font-family: var(--font-display); font-size: 1.8rem; font-weight: 800; color: var(--navy); }
    .stat-label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); }
  </style>
</head>
<body>

<div class="sidebar">
  <div class="d-flex align-items-center mb-4 px-2">
    <div style="width:30px; height:30px; background:var(--gold); border-radius:6px; margin-right:10px;"></div>
    <span class="fw-bold">HRPAMS</span>
  </div>
  <a href="#" class="nav-link-custom active"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a>
  <a href="#" class="nav-link-custom"><i class="bi bi-people me-2"></i> Staff Management</a>
  <a href="#" class="nav-link-custom"><i class="bi bi-wallet2 me-2"></i> Payroll</a>
  <a href="#" class="nav-link-custom"><i class="bi bi-graph-up me-2"></i> Accounting</a>
</div>

<div class="content-area">
  <h2 class="mb-4 fw-bold">Dashboard Overview</h2>
  
  <div class="row g-4">
    <div class="col-md-3">
      <div class="card-custom">
        <div class="stat-label">Total Staff</div>
        <div class="stat-val">1,205</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card-custom">
        <div class="stat-label">Active Payroll</div>
        <div class="stat-val">$45,000</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card-custom">
        <div class="stat-label">Pending Requests</div>
        <div class="stat-val">12</div>
      </div>
    </div>
    <div class="col-md-3">
      <div class="card-custom">
        <div class="stat-label">Loans</div>
        <div class="stat-val">08</div>
      </div>
    </div>
  </div>

  <div class="card-custom mt-4">
    <h5 class="mb-3">Recent Activity</h5>
    <table class="table align-middle">
      <thead class="table-light">
        <tr><th>ID</th><th>Name</th><th>Status</th></tr>
      </thead>
      <tbody>
        <tr><td>#001</td><td>Alice Johnson</td><td><span class="badge bg-success">Active</span></td></tr>
        <tr><td>#002</td><td>Bob Smith</td><td><span class="badge bg-warning text-dark">Pending</span></td></tr>
      </tbody>
    </table>
  </div>
</div>

</body>
</html>
