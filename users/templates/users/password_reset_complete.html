{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset Complete — HRPAMS</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@600;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="{% static 'css/hrpams.css' %}" />
</head>
<body>

<div class="auth-shell">
  <div class="auth-card">

    <div class="auth-header">
      <div class="auth-logo">
        <div class="auth-logo-icon">HR</div>
        <div class="auth-logo-text">
          <div class="name">HRPAMS</div>
          <div class="sub">Enterprise Suite v2.0</div>
        </div>
      </div>
    </div>

    <div class="auth-body" style="text-align:center;padding:40px 32px;">
      <div style="
        width:64px;height:64px;
        background:var(--green-bg);
        border-radius:50%;
        display:flex;align-items:center;justify-content:center;
        margin:0 auto 20px;
        font-size:1.8rem;color:var(--green);">
        <i class="bi bi-shield-check"></i>
      </div>

      <h2 style="font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--text-primary);margin-bottom:8px;">
        Password updated successfully
      </h2>
      <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:28px;line-height:1.6;">
        Your password has been changed. You can now sign in with your new credentials.
      </p>

      <a href="{% url 'login' %}" class="btn btn-primary btn-block" style="height:42px;font-size:.88rem;justify-content:center;">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </a>
    </div>

    <div class="auth-footer">
      HRPAMS Enterprise Suite v2.0 &nbsp;·&nbsp; &copy; {% now "Y" %} KwikSchools
    </div>

  </div>
</div>

</body>
</html>
